name: Run Comparativa M11-M14

on:
  workflow_dispatch:
    inputs:
      max_iter:
        description: 'Iteraciones por módulo (max_iter)'
        required: false
        default: '3'
      modules:
        description: 'Módulos a correr (separados por coma, ej: M11,M12,M13,M14)'
        required: false
        default: 'M11,M12,M13,M14'

jobs:
  run-modules:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: claude/wonderful-hopper-Nsrsu

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install numpy matplotlib simpy scikit-learn scipy smac

      - name: Run continuar_comparativa.py
        run: |
          python continuar_comparativa.py
        env:
          PYTHONUNBUFFERED: "1"

      - name: Upload result JSONs as artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: resultados-comparativa
          path: |
            resultado_comparativa_m*.json
            resultado_comparativa_m*.png
            resultados_comparativa.json
            comparativa_*.png
          retention-days: 30

      - name: Commit and push results
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f resultado_comparativa_m*.json resultado_comparativa_m*.png resultados_comparativa.json comparativa_*.png 2>/dev/null || true
          git diff --cached --quiet || git commit -m "ci: add M11-M14 results from GitHub Actions run"
          git push origin claude/wonderful-hopper-Nsrsu
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
